name: Deploy

# Auto-deploys the dashboard to Vercel production on every push to main.
# Backend deploys via Coolify git webhook (configured in Coolify dashboard,
# not GitHub Actions — Coolify polls the repo directly).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN         — Vercel team service token (Settings → Tokens)
#   VERCEL_ORG_ID        — team ID (vercel.com/teams → Settings → "Team ID" — also in .vercel/project.json)
#   VERCEL_PROJECT_ID    — created on first `vercel link`, stored in `.vercel/project.json`

on:
  push:
    branches: [main]
    paths:
      - dashboard/**
      - .github/workflows/deploy.yml

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-dashboard:
    name: Deploy dashboard to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tee /tmp/vercel-url.txt
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Print production URL
        run: cat /tmp/vercel-url.txt