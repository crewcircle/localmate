# docker-compose.yml — Local development + Coolify deployment
# Usage:
#   Local dev:   docker compose up
#   Coolify:    Connects repo, uses backend/Dockerfile, Doppler injects env at runtime
#
# Required env vars (inject via Doppler or .env.local):
#   See backend/.env.example for full list

services:
  backend:
    build:
      context: ./backend
      dockerfile: backend/Dockerfile
    container_name: localmate-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env.local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped